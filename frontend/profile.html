<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Researcher Dashboard – Collabify</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">Collabify<span>.</span></a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="profile.html">Create Profile</a></li>
      <li><a href="collaborators.html">Find Collaborators</a></li>
      <li><a href="ideaboard.html">Idea Board</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <a href="profile.html" class="btn-nav">Get Started</a>
    <div class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
  </nav>

  <div class="page-header">
    <h1>Researcher Dashboard</h1>
    <p>Manage your professional identity and discover collaboration matches.</p>
  </div>

  <section class="profile-section">
    <div class="profile-form-wrap">

      <div class="form-card">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Full Name</label>
          <input type="text" id="name" placeholder="e.g. Shravani Shah"/>
        </div>
        <div class="form-group">
          <label><i class="fas fa-tools"></i> Expertise / Skills</label>
          <input type="text" id="skills" placeholder="e.g. AI, Python, SDG 13"/>
          <span class="hint">Separate with commas</span>
        </div>
        <div class="form-group">
          <label><i class="fas fa-university"></i> University / Institution</label>
          <input type="text" id="college" placeholder="e.g. IIT Bombay"/>
        </div>
        
        <button class="btn-primary full-width" onclick="saveProfileAndMatch(event)">
          <i class="fas fa-magic"></i> Save Profile & Find Matches
        </button>
      </div>

      <div class="profile-preview-wrap">
        <h3>Profile Preview</h3>
        <div class="profile-card" id="preview-card">
          <div class="profile-avatar" id="prev-avatar">A</div>
          <div class="profile-name" id="prev-name">Your Name</div>
          <div class="profile-field" id="prev-field">Researcher</div>
          <div id="prev-college" style="font-size: 0.85rem; color: #64748b; margin-bottom: 15px;">Institution</div>
          <div class="profile-skills-wrap">
            <span class="skills-label">Skills</span>
            <div class="profile-tags skills-tags" id="prev-skills">
                <span>Skill 1</span>
                <span>Skill 2</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </section>

  <div id="toast-container" class="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
